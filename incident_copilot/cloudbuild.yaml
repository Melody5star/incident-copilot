steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/incident-copilot/app:$COMMIT_SHA'
      - .
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/incident-copilot/app:$COMMIT_SHA'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - incident-copilot
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/incident-copilot/app:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --memory=1Gi
      - --timeout=300
      - --set-secrets=ELASTIC_CLOUD_ID=elastic-cloud-id:latest,ELASTIC_API_KEY=elastic-api-key:latest,GITLAB_TOKEN=gitlab-token:latest,PHOENIX_API_KEY=phoenix-api-key:latest

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
